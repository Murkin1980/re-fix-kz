<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 36 44" width="36" height="44">
  <!-- Cabinet outline -->
  <rect x="0" y="0" width="36" height="44" rx="2" fill="none" stroke="#222325" stroke-width="2"/>
  <!-- Cabinet doors -->
  <line x1="18" y1="0" x2="18" y2="44" stroke="#222325" stroke-width="2"/>
  <!-- Door handles -->
  <line x1="14" y1="18" x2="14" y2="20" stroke="#FF7A1A" stroke-width="2" stroke-linecap="round"/>
  <line x1="22" y1="18" x2="22" y2="20" stroke="#FF7A1A" stroke-width="2" stroke-linecap="round"/>
  <!-- Key overlay -->
  <g transform="translate(8, 28) rotate(-45)">
    <circle cx="8" cy="8" r="5" fill="none" stroke="#FF7A1A" stroke-width="2"/>
    <line x1="8" y1="13" x2="8" y2="22" stroke="#FF7A1A" stroke-width="2" stroke-linecap="round"/>
    <line x1="5" y1="19" x2="11" y2="19" stroke="#FF7A1A" stroke-width="2" stroke-linecap="round"/>
    <line x1="5" y1="22" x2="9" y2="22" stroke="#FF7A1A" stroke-width="2" stroke-linecap="round"/>
  </g>
</svg>
